name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0  # Required for pyzbar/QR decoding

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Contract parity snapshots
        run: pytest -v --tb=short tests/contracts/test_v1_v2_snapshot_parity.py

      - name: Dependency audit
        if: matrix.python-version == '3.11'
        run: |
          python -m pip freeze --exclude-editable > .pip-audit-requirements.txt
          python -m pip_audit --progress-spinner off --strict -r .pip-audit-requirements.txt

      - name: Test
        run: pytest -v --tb=short -m "not network"

      - name: Test with coverage
        if: matrix.python-version == '3.11'
        run: pytest -v --cov=lsh --cov-report=term-missing -m "not network"

  ui-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Type check UI
        run: npm run typecheck

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API container image
        run: docker build -t lsh-api:ci .

      - name: Run API container
        run: docker run -d -p 8000:8000 --name lsh-api-ci lsh-api:ci

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API failed health check in time"
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Contract smoke against container
        working-directory: ui
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          NEXT_PUBLIC_UI_ORIGIN: http://127.0.0.1:3000
        run: npm run smoke:api

      - name: Show container logs on failure
        if: failure()
        run: docker logs lsh-api-ci

      - name: Stop API container
        if: always()
        run: docker rm -f lsh-api-ci

